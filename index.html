<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Roa Proxy Hub v3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto&family=Poppins&family=Montserrat&family=Oswald&family=Raleway&family=Ubuntu&family=Play&family=Audiowide&family=Exo&family=Titillium+Web&family=Kanit&family=Anton&family=Bebas+Neue&family=Cabin&family=Dosis&family=Fira+Sans&family=Hind&family=Inconsolata&family=Josefin+Sans&family=Lato&family=Merriweather&family=Nunito&family=PT+Sans&family=Quicksand&display=swap" rel="stylesheet">

<style>
:root{
  --neon:#9b59b6;
  --glow:2.5;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050010;
  color:white;
  font-family:'Segoe UI',sans-serif;
  overflow-x:hidden;
  transition:0.4s;
}

/* UPDATE BAR */
#updateBar{
  text-align:center;
  padding:10px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--neon);
  color:var(--neon);
  text-shadow:0 0 10px var(--neon);
}

/* HEADER */
header{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
  position:relative;
}

header h1{
  font-size:3rem;
  color:var(--neon);
  text-shadow:0 0 calc(20px * var(--glow)) var(--neon);
}

.settingsBtn{
  position:absolute;
  right:40px;
  padding:10px 20px;
  border-radius:12px;
  border:1px solid var(--neon);
  background:rgba(0,0,0,0.4);
  color:white;
  backdrop-filter:blur(10px);
  cursor:pointer;
}

/* CARDS */
#games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:40px;
  padding:80px;
}

.card{
  background:rgba(30,0,50,0.6);
  backdrop-filter:blur(15px);
  padding:50px;
  border-radius:20px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 calc(20px * var(--glow)) var(--neon);
}

.card:hover{
  transform:translateY(-8px);
}

/* SETTINGS PANEL */
#settingsPanel{
  position:fixed;
  top:0;
  right:-450px;
  width:450px;
  height:100%;
  background:rgba(10,0,30,0.85);
  backdrop-filter:blur(25px);
  border-left:2px solid var(--neon);
  padding:30px;
  transition:0.4s;
  overflow-y:auto;
  z-index:1000;
}

#settingsPanel.open{
  right:0;
}

#settingsPanel h2{
  margin-bottom:20px;
  color:var(--neon);
}

.settingGroup{
  margin-bottom:25px;
}

.settingGroup label{
  display:block;
  margin-bottom:5px;
}

select,input[type="color"],input[type="range"]{
  width:100%;
  padding:8px;
  border-radius:10px;
  border:none;
}

.saveBtn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--neon);
  font-weight:bold;
  cursor:pointer;
}
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="updateBar">
  v3.0 – Animated Backgrounds • 25 Fonts • Glass UI Upgrade • Shadow Active
</div>

<header>
  <h1>Roa Proxy Hub</h1>
  <button class="settingsBtn" onclick="toggleSettings()">Settings</button>
</header>

<section id="games">
  <div class="card" onclick="window.location.href='https://bop.education/'">Utopia</div>
  <div class="card" onclick="window.location.href='https://nextgrammar.thekingdomexchange.com/'">Shadow 🔥</div>
</section>

<div id="settingsPanel">
  <h2>Custom UI</h2>

  <div class="settingGroup">
    <label>Neon Color</label>
    <input type="color" id="neonPicker">
  </div>

  <div class="settingGroup">
    <label>Glow Strength</label>
    <input type="range" min="1" max="5" step="0.1" id="glowSlider">
  </div>

  <div class="settingGroup">
    <label>Font (25 Options)</label>
    <select id="fontChanger">
      <option value="Segoe UI">Default</option>
      <option value="Orbitron">Orbitron</option>
      <option value="Poppins">Poppins</option>
      <option value="Montserrat">Montserrat</option>
      <option value="Oswald">Oswald</option>
      <option value="Raleway">Raleway</option>
      <option value="Ubuntu">Ubuntu</option>
      <option value="Play">Play</option>
      <option value="Audiowide">Audiowide</option>
      <option value="Exo">Exo</option>
      <option value="Titillium Web">Titillium</option>
      <option value="Kanit">Kanit</option>
      <option value="Anton">Anton</option>
      <option value="Bebas Neue">Bebas Neue</option>
      <option value="Cabin">Cabin</option>
      <option value="Dosis">Dosis</option>
      <option value="Fira Sans">Fira Sans</option>
      <option value="Hind">Hind</option>
      <option value="Inconsolata">Inconsolata</option>
      <option value="Josefin Sans">Josefin</option>
      <option value="Lato">Lato</option>
      <option value="Merriweather">Merriweather</option>
      <option value="Nunito">Nunito</option>
      <option value="PT Sans">PT Sans</option>
      <option value="Quicksand">Quicksand</option>
    </select>
  </div>

  <div class="settingGroup">
    <label>Animated Background</label>
    <select id="bgPreset">
      <option value="snow">Snow</option>
      <option value="stars">Shooting Stars</option>
      <option value="matrix">Matrix Rain</option>
      <option value="fog">Dusk Fog</option>
      <option value="void">Dark Void</option>
    </select>
  </div>

  <button class="saveBtn" onclick="saveSettings()">Save Settings</button>
</div>

<script>
function toggleSettings(){
  document.getElementById("settingsPanel").classList.toggle("open");
}

/* FONT */
fontChanger.onchange=e=>document.body.style.fontFamily=e.target.value;

/* NEON */
neonPicker.oninput=e=>document.documentElement.style.setProperty("--neon",e.target.value);

/* GLOW */
glowSlider.oninput=e=>document.documentElement.style.setProperty("--glow",e.target.value);

/* SAVE */
function saveSettings(){
  localStorage.setItem("font",document.body.style.fontFamily);
  localStorage.setItem("neon",getComputedStyle(document.documentElement).getPropertyValue("--neon"));
  localStorage.setItem("glow",getComputedStyle(document.documentElement).getPropertyValue("--glow"));
  alert("Saved!");
}

window.onload=()=>{
  if(localStorage.getItem("font"))document.body.style.fontFamily=localStorage.getItem("font");
  if(localStorage.getItem("neon"))document.documentElement.style.setProperty("--neon",localStorage.getItem("neon"));
  if(localStorage.getItem("glow"))document.documentElement.style.setProperty("--glow",localStorage.getItem("glow"));
}

/* BACKGROUND ANIMATIONS */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function snow(){
  particles=[];
  for(let i=0;i<200;i++){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3,s:Math.random()*2});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      p.y+=p.s;
      if(p.y>canvas.height)p.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

bgPreset.onchange=e=>{
  if(e.target.value==="snow")snow();
};

snow();
</script>

</body>
</html>
